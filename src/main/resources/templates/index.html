<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <title>请选择要进入的搜索系统</title>
  <style>
    body {
      margin: 0;
      font: 16px/1.6 tahoma, arial, "宋体";
      background: #f5f7fb;
      color: #222;
    }

    .home-page {
      width: 720px;
      margin: 80px auto;
      padding: 36px 40px;
      background: #fff;
      border: 1px solid #dfe6f1;
    }

    .home-page h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    .home-page p {
      margin: 0 0 24px;
      color: #666;
    }

    .home-links a {
      display: block;
      margin-bottom: 14px;
      padding: 14px 18px;
      border: 1px solid #d9e0ef;
      color: #1f3a8a;
      text-decoration: none;
      background: #f8faff;
    }

    .home-links a:hover {
      background: #eef4ff;
    }

    .home-guide {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #e6ebf5;
      color: #555;
      font-size: 14px;
    }

    .home-guide h2 {
      margin: 0 0 12px;
      font-size: 18px;
      color: #222;
    }

    .home-guide p {
      margin: 0 0 10px;
    }

    .home-guide code {
      padding: 1px 4px;
      background: #f3f6fc;
      border: 1px solid #e1e7f2;
    }
  </style>
</head>
<body>
<div class="home-page">
  <h1>请选择要进入的搜索系统</h1>
  <div class="home-links">
    <a th:href="@{/jdsearch}">京东搜索</a>
    <a th:href="@{/contentse}">全文搜索</a>
  </div>
  <div class="home-guide">
    <h2>常用 URL 说明</h2>
    <p><code>/jdsearch</code>：京东搜索</p>
    <p><code>/contentse</code>：全文搜索</p>
    <p><code>/writeQA</code>：从 <code>./data/course_qa.json</code> 读取全文搜索测试数据，并写入 es</p>
    <p><code>/writeJD</code>：支持浏览器直接访问（GET）或 POST 调用，从 <code>./data/jddata.json</code> 读取京东商品数据，并写入 es</p>
  </div>
</div>
</body>
</html>
