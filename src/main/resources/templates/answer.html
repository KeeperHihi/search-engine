<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>问题及答案</title>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
</head>
<body style="font-family:tahoma,arial,'宋体'; background:#f7f9fc; color:#222;">
<div style="width:900px; margin:36px auto; background:#fff; border:1px solid #dfe6f1; padding:28px 36px;">
  <p style="margin-bottom:18px;">
    <a th:href="@{/contentse}" style="color:#0000FF; text-decoration:none;">返回全文搜索</a>
  </p>

  <p style="font-size:14px; color:#666; margin-bottom:12px;"
     th:text="'类别: ' + ${categoryName} + '    题号: ' + ${questionId}"></p>

  <div style="margin-bottom:18px; padding:12px 16px; background:#f7f9fe; border:1px solid #dfe6f1; font-size:14px; color:#555;">
    <span style="margin-right:18px;">总分 <strong id="detail-total-score">-</strong></span>
    <span style="margin-right:18px;">问题召回分 <strong id="detail-question-score">-</strong></span>
    <span style="margin-right:18px;">答案重排分 <strong id="detail-answer-score">-</strong></span>
    <span style="margin-right:18px;">答案 BM25 原始分 <strong id="detail-answer-bm25-raw-score">-</strong></span>
    <span style="margin-right:18px;">BM25 归一化基准 <strong id="detail-answer-bm25-base">-</strong></span>
    <span>answer_quality <strong id="detail-answer-quality" th:text="${answer_quality == null ? '-' : answer_quality}">-</strong></span>
  </div>

  <div style="margin-bottom:18px;">
    <p style="font-size:18px; color:#0000FF; margin-bottom:10px;">问题</p>
    <p style="font-size:16px; line-height:1.8;" th:text="${questionText}"></p>
    <div style="margin-top:12px; padding:10px 12px; background:#f7f9fe; border:1px solid #dfe6f1;">
      <p style="margin:0 0 6px; font-size:13px; color:#666;">问题分词结果</p>
      <p style="margin:0; font-size:14px; line-height:1.8; color:#444;" th:text="${questionTermsText}"></p>
    </div>
  </div>

  <hr style="border:none; border-top:1px solid #e5eaf3; margin:20px 0;">

  <div>
    <p style="font-size:18px; color:#0000FF; margin-bottom:10px;">答案</p>
    <p style="font-size:16px; line-height:1.9; white-space:pre-wrap;" th:text="${answerText}"></p>
    <div style="margin-top:12px; padding:10px 12px; background:#f7f9fe; border:1px solid #dfe6f1;">
      <p style="margin:0 0 6px; font-size:13px; color:#666;">答案分词结果</p>
      <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:16px;">
        <p id="detail-answer-terms" style="margin:0; font-size:14px; line-height:1.8; color:#444; flex:1;" th:text="${answerTermsText}"></p>
      </div>
    </div>
    <div style="margin-top:12px; padding:10px 12px; background:#f7f9fe; border:1px solid #dfe6f1;">
      <p style="margin:0 0 6px; font-size:13px; color:#666;">实际搜索问题的分词结果</p>
      <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:16px;">
        <p id="detail-keyword-terms" style="margin:0; font-size:14px; line-height:1.8; color:#444; flex:1;">无</p>
        <span id="detail-keyword-hit-ratio" style="display:none; min-width:48px; text-align:right; color:#c0392b; font-size:14px; line-height:1.8;">0/0</span>
      </div>
    </div>
  </div>
</div>
<script th:inline="javascript">
  (function () {
    var answerId = /*[[${answerId}]]*/ "";
    var answerTerms = /*[[${answerTerms}]]*/ [];
    if (!answerId) {
      return;
    }

    try {
      var rawState = window.sessionStorage.getItem("courseQaSearchState");
      if (!rawState) {
        return;
      }
      var searchState = JSON.parse(rawState);
      var results = searchState && searchState.results ? searchState.results : [];
      var currentItem = null;
      for (var index = 0; index < results.length; index++) {
        if (results[index].answerDocumentId === answerId) {
          currentItem = results[index];
          break;
        }
      }
      if (!currentItem) {
        return;
      }

      document.getElementById("detail-total-score").textContent = Number(currentItem.totalScore || 0).toFixed(4);
      document.getElementById("detail-question-score").textContent = Number(currentItem.questionRecallScore || 0).toFixed(4);
      document.getElementById("detail-answer-score").textContent = Number(currentItem.answerRerankScore || 0).toFixed(4);
      document.getElementById("detail-answer-bm25-raw-score").textContent =
        Number(currentItem.answerBm25RawScore || 0).toFixed(4);
      document.getElementById("detail-answer-bm25-base").textContent =
        Number(currentItem.answerBm25NormalizationBase || 0).toFixed(4);
      if (currentItem.answer_quality !== undefined && currentItem.answer_quality !== null) {
        document.getElementById("detail-answer-quality").textContent = currentItem.answer_quality;
      }
      renderAnswerTerms(answerTerms, []);
      if (searchState.keywordTerms && searchState.keywordTerms.length > 0) {
        renderKeywordTerms(searchState.keywordTerms, answerTerms);
        renderAnswerTerms(answerTerms, searchState.keywordTerms);
      }
    } catch (error) {
      // 详情页评分展示只是辅助能力，缓存异常时不阻断主页面展示。
    }

    function renderAnswerTerms(answerTerms, keywordTerms) {
      renderHighlightedTerms("detail-answer-terms", answerTerms, keywordTerms);
    }

    function renderKeywordTerms(keywordTerms, answerTerms) {
      var container = document.getElementById("detail-keyword-terms");
      var ratioElement = document.getElementById("detail-keyword-hit-ratio");
      if (!container) {
        return;
      }

      var renderResult = renderHighlightedTerms("detail-keyword-terms", keywordTerms, answerTerms);
      if (!ratioElement) {
        return;
      }
      ratioElement.style.display = "inline";
      ratioElement.textContent = renderResult.hitCount + "/" + renderResult.totalCount;
    }

    function renderHighlightedTerms(containerId, baseTerms, hitTerms) {
      var container = document.getElementById(containerId);
      if (!container) {
        return {hitCount: 0, totalCount: 0};
      }

      if (!Array.isArray(baseTerms) || baseTerms.length === 0) {
        container.textContent = "无";
        return {hitCount: 0, totalCount: 0};
      }

      var normalizedHitTerms = buildNormalizedTermSet(hitTerms);
      var hitCount = 0;
      container.textContent = "";
      for (var termIndex = 0; termIndex < baseTerms.length; termIndex++) {
        var rawTerm = baseTerms[termIndex];
        var currentTerm = rawTerm === undefined || rawTerm === null ? "" : String(rawTerm);
        var currentSpan = document.createElement("span");
        if (normalizedHitTerms[normalizeTerm(currentTerm)]) {
          currentSpan.style.color = "#c0392b";
          hitCount++;
        }
        currentSpan.textContent = currentTerm;
        container.appendChild(currentSpan);

        if (termIndex < baseTerms.length - 1) {
          container.appendChild(document.createTextNode(" / "));
        }
      }

      return {
        hitCount: hitCount,
        totalCount: baseTerms.length
      };
    }

    function buildNormalizedTermSet(terms) {
      var normalizedTerms = {};
      if (!Array.isArray(terms)) {
        return normalizedTerms;
      }

      for (var termIndex = 0; termIndex < terms.length; termIndex++) {
        var normalizedTerm = normalizeTerm(terms[termIndex]);
        if (normalizedTerm) {
          normalizedTerms[normalizedTerm] = true;
        }
      }
      return normalizedTerms;
    }

    function normalizeTerm(term) {
      if (term === undefined || term === null) {
        return "";
      }
      return String(term).trim().toLowerCase();
    }
  })();
</script>
</body>
</html>
